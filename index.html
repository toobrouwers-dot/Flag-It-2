<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Flag it">
<meta name="theme-color" content="#0a0a0a">
<title>Flag it</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;600;700;800&family=Barlow:wght@400;500;600&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #0a0a0a;
  --surface: #141414;
  --surface2: #1e1e1e;
  --border: rgba(255,255,255,0.08);
  --accent: #7f77dd;
  --accent2: #afa9ec;
  --text: #f5f5f5;
  --muted: #888;
  --success: #4caf50;
  --flash: #ffc107;
  --attempt: #555;
  --safe-top: env(safe-area-inset-top, 0px);
  --safe-bot: env(safe-area-inset-bottom, 0px);
}

* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
html { background: var(--bg); }
body {
  font-family: 'Barlow', sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100dvh;
  max-width: 430px;
  margin: 0 auto;
  position: relative;
  overflow-x: hidden;
}

/* NAV */
.bottom-nav {
  position: fixed;
  bottom: 0;
  left: 50%;
  transform: translateX(-50%);
  width: 100%;
  max-width: 430px;
  background: rgba(14,14,14,0.95);
  backdrop-filter: blur(12px);
  border-top: 0.5px solid var(--border);
  display: flex;
  padding-bottom: var(--safe-bot);
  z-index: 100;
}
.nav-btn {
  flex: 1;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 3px;
  padding: 10px 0 8px;
  background: none;
  border: none;
  color: var(--muted);
  font-family: 'Barlow', sans-serif;
  font-size: 10px;
  font-weight: 500;
  letter-spacing: 0.5px;
  cursor: pointer;
  transition: color 0.2s;
  text-transform: uppercase;
}
.nav-btn.active { color: var(--accent); }
.nav-btn svg { width: 22px; height: 22px; }

/* PAGES */
.page { display: none; padding-bottom: calc(70px + var(--safe-bot)); }
.page.active { display: block; }

/* HEADER */
.page-header {
  padding: calc(var(--safe-top) + 16px) 20px 16px;
  position: sticky;
  top: 0;
  background: rgba(10,10,10,0.92);
  backdrop-filter: blur(12px);
  z-index: 50;
  border-bottom: 0.5px solid var(--border);
}
.page-title {
  font-family: 'Barlow Condensed', sans-serif;
  font-size: 28px;
  font-weight: 800;
  letter-spacing: 0.5px;
  text-transform: uppercase;
}
.page-sub { font-size: 13px; color: var(--muted); margin-top: 2px; }

/* FEED / HOME */
.hero-stats {
  padding: 24px 20px 20px;
  background: linear-gradient(160deg, #0f0d1f 0%, var(--bg) 60%);
  border-bottom: 0.5px solid var(--border);
}
.hero-greeting {
  font-family: 'Barlow Condensed', sans-serif;
  font-size: 13px;
  font-weight: 600;
  color: var(--accent);
  text-transform: uppercase;
  letter-spacing: 1.5px;
  margin-bottom: 4px;
}
.hero-name {
  font-family: 'Barlow Condensed', sans-serif;
  font-size: 36px;
  font-weight: 800;
  line-height: 1;
  text-transform: uppercase;
  margin-bottom: 20px;
}
.stats-row {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 1px;
  background: var(--border);
  border-radius: 12px;
  overflow: hidden;
}
.stat-box {
  background: var(--surface);
  padding: 14px 12px;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 2px;
}
.stat-num {
  font-family: 'Barlow Condensed', sans-serif;
  font-size: 28px;
  font-weight: 800;
  color: var(--text);
}
.stat-label {
  font-size: 10px;
  color: var(--muted);
  text-transform: uppercase;
  letter-spacing: 0.8px;
  text-align: center;
}

.section-title {
  font-family: 'Barlow Condensed', sans-serif;
  font-size: 13px;
  font-weight: 700;
  color: var(--muted);
  text-transform: uppercase;
  letter-spacing: 1.5px;
  padding: 20px 20px 10px;
}

/* ACTIVITY CARD */
.activity-card {
  margin: 0 16px 12px;
  background: var(--surface);
  border-radius: 16px;
  border: 0.5px solid var(--border);
  overflow: hidden;
  animation: slideUp 0.3s ease both;
}
@keyframes slideUp { from { opacity:0; transform: translateY(12px); } to { opacity:1; transform: none; } }

.activity-header {
  display: flex;
  justify-content: space-between;
  align-items: flex-start;
  padding: 14px 16px 0;
}
.activity-gym {
  font-family: 'Barlow Condensed', sans-serif;
  font-size: 18px;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 0.3px;
}
.activity-date { font-size: 12px; color: var(--muted); margin-top: 2px; }
.activity-max {
  font-family: 'Barlow Condensed', sans-serif;
  font-size: 32px;
  font-weight: 800;
  color: var(--accent);
  line-height: 1;
}
.activity-max-label { font-size: 10px; color: var(--muted); text-transform: uppercase; text-align: right; letter-spacing: 0.5px; }

.activity-routes {
  display: flex;
  flex-wrap: wrap;
  gap: 6px;
  padding: 12px 16px 14px;
}
.route-chip {
  display: flex;
  align-items: center;
  gap: 5px;
  background: var(--surface2);
  border-radius: 20px;
  padding: 4px 10px 4px 6px;
  font-size: 13px;
  font-weight: 500;
}
.route-chip .dot {
  width: 8px;
  height: 8px;
  border-radius: 50%;
}
.chip-top .dot { background: var(--success); }
.chip-flash .dot { background: var(--flash); }
.chip-poging .dot { background: var(--attempt); }

.empty-feed {
  text-align: center;
  padding: 60px 20px;
  color: var(--muted);
}
.empty-feed .big { font-family: 'Barlow Condensed', sans-serif; font-size: 20px; font-weight: 700; color: var(--text); margin-bottom: 6px; text-transform: uppercase; }

/* LOG PAGE */
.log-form { padding: 16px 20px; }
.form-section { margin-bottom: 20px; }
.form-section-title {
  font-family: 'Barlow Condensed', sans-serif;
  font-size: 13px;
  font-weight: 700;
  color: var(--muted);
  text-transform: uppercase;
  letter-spacing: 1px;
  margin-bottom: 10px;
}
.input-row { display: flex; gap: 10px; margin-bottom: 10px; }
.field { flex: 1; display: flex; flex-direction: column; gap: 6px; }
.field label { font-size: 12px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.5px; }
input[type=text], input[type=date], input[type=number], select {
  background: var(--surface);
  border: 0.5px solid var(--border);
  border-radius: 10px;
  color: var(--text);
  font-family: 'Barlow', sans-serif;
  font-size: 15px;
  padding: 12px 14px;
  width: 100%;
  -webkit-appearance: none;
  appearance: none;
  outline: none;
}
input:focus, select:focus { border-color: var(--accent); }
select option { background: #1e1e1e; }

/* ROUTE CARDS in log */
.route-card {
  background: var(--surface);
  border: 0.5px solid var(--border);
  border-radius: 12px;
  padding: 12px;
  margin-bottom: 10px;
  position: relative;
}
.route-card-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; }
.route-num {
  font-family: 'Barlow Condensed', sans-serif;
  font-size: 13px;
  font-weight: 700;
  color: var(--muted);
  text-transform: uppercase;
  letter-spacing: 1px;
}
.btn-remove-route {
  background: none;
  border: none;
  color: var(--muted);
  font-size: 20px;
  cursor: pointer;
  padding: 0;
  line-height: 1;
}
.route-fields { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
.route-fields .field.full { grid-column: 1 / -1; }

/* RESULT TOGGLE */
.result-toggle { display: flex; gap: 6px; }
.result-btn {
  flex: 1;
  padding: 10px 4px;
  border-radius: 8px;
  border: 0.5px solid var(--border);
  background: var(--surface2);
  color: var(--muted);
  font-family: 'Barlow', sans-serif;
  font-size: 13px;
  font-weight: 600;
  cursor: pointer;
  text-align: center;
  transition: all 0.15s;
}
.result-btn.sel-top { background: rgba(76,175,80,0.2); border-color: var(--success); color: var(--success); }
.result-btn.sel-flash { background: rgba(255,193,7,0.2); border-color: var(--flash); color: var(--flash); }
.result-btn.sel-poging { background: rgba(85,85,85,0.3); border-color: #777; color: #ccc; }

.btn-add-route {
  width: 100%;
  padding: 13px;
  background: none;
  border: 0.5px dashed rgba(255,255,255,0.2);
  border-radius: 12px;
  color: var(--muted);
  font-family: 'Barlow', sans-serif;
  font-size: 14px;
  cursor: pointer;
  margin-bottom: 12px;
  transition: all 0.15s;
}
.btn-add-route:active { background: var(--surface); }

.btn-save {
  width: 100%;
  padding: 16px;
  background: var(--accent);
  border: none;
  border-radius: 14px;
  color: #fff;
  font-family: 'Barlow Condensed', sans-serif;
  font-size: 20px;
  font-weight: 800;
  text-transform: uppercase;
  letter-spacing: 1px;
  cursor: pointer;
  transition: transform 0.1s, opacity 0.1s;
}
.btn-save:active { transform: scale(0.98); opacity: 0.9; }

/* STATS PAGE */
.stats-content { padding: 16px 20px; }
.pr-row {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 12px;
  margin-bottom: 20px;
}
.pr-card {
  background: var(--surface);
  border-radius: 14px;
  border: 0.5px solid var(--border);
  padding: 16px;
}
.pr-label { font-size: 11px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.8px; margin-bottom: 6px; }
.pr-grade {
  font-family: 'Barlow Condensed', sans-serif;
  font-size: 40px;
  font-weight: 800;
  line-height: 1;
  color: var(--accent);
}
.pr-grade.flash { color: var(--flash); }
.pr-date { font-size: 11px; color: var(--muted); margin-top: 4px; }

.chart-card {
  background: var(--surface);
  border-radius: 14px;
  border: 0.5px solid var(--border);
  padding: 16px;
  margin-bottom: 16px;
}
.chart-card-title {
  font-family: 'Barlow Condensed', sans-serif;
  font-size: 14px;
  font-weight: 700;
  color: var(--muted);
  text-transform: uppercase;
  letter-spacing: 1px;
  margin-bottom: 14px;
}
.chart-wrap { position: relative; }

/* TOAST */
.toast {
  position: fixed;
  bottom: calc(80px + var(--safe-bot));
  left: 50%;
  transform: translateX(-50%) translateY(20px);
  background: var(--success);
  color: #fff;
  font-family: 'Barlow Condensed', sans-serif;
  font-size: 16px;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 1px;
  padding: 12px 24px;
  border-radius: 40px;
  opacity: 0;
  transition: all 0.3s;
  z-index: 200;
  pointer-events: none;
  white-space: nowrap;
}
.toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
</style>
</head>
<body>

<!-- HOME -->
<div id="page-home" class="page active">
  <div class="hero-stats">
    <div class="hero-greeting">Jouw stats</div>
    <div class="hero-name" id="home-title">Flag it</div>
    <div class="stats-row">
      <div class="stat-box"><div class="stat-num" id="hs-sessions">0</div><div class="stat-label">Sessies</div></div>
      <div class="stat-box"><div class="stat-num" id="hs-routes">0</div><div class="stat-label">Routes</div></div>
      <div class="stat-box"><div class="stat-num" id="hs-pr">—</div><div class="stat-label">PR Top</div></div>
    </div>
  </div>
  <div class="section-title">Recente sessies</div>
  <div id="feed"></div>
</div>

<!-- LOG -->
<div id="page-log" class="page">
  <div class="page-header">
    <div class="page-title">Nieuwe sessie</div>
  </div>
  <div class="log-form">
    <div class="form-section">
      <div class="form-section-title">Sessie info</div>
      <div class="input-row">
        <div class="field">
          <label>Datum</label>
          <input type="date" id="inp-date">
        </div>
      </div>
      <div class="input-row">
        <div class="field">
          <label>Gym</label>
          <input type="text" id="inp-gym" placeholder="bijv. Monk, ClimbUp...">
        </div>
      </div>
    </div>

    <div class="form-section">
      <div class="form-section-title">Routes</div>
      <div id="route-cards"></div>
      <button class="btn-add-route" onclick="addRouteCard()">+ Route toevoegen</button>
    </div>

    <button class="btn-save" onclick="saveSession()">Sessie opslaan</button>
  </div>
</div>

<!-- STATS -->
<div id="page-stats" class="page">
  <div class="page-header">
    <div class="page-title">Voortgang</div>
  </div>
  <div class="stats-content">
    <div class="pr-row">
      <div class="pr-card">
        <div class="pr-label">Hoogste top</div>
        <div class="pr-grade" id="pr-top">—</div>
        <div class="pr-date" id="pr-top-date"></div>
      </div>
      <div class="pr-card">
        <div class="pr-label">Hoogste flash</div>
        <div class="pr-grade flash" id="pr-flash">—</div>
        <div class="pr-date" id="pr-flash-date"></div>
      </div>
    </div>

    <div class="chart-card">
      <div class="chart-card-title">Max graad per sessie</div>
      <div class="chart-wrap" style="height: 180px;">
        <canvas id="chart-progress" role="img" aria-label="Lijndiagram max graad per sessie"></canvas>
      </div>
    </div>

    <div class="chart-card">
      <div class="chart-card-title">Routes per graad (geslaagd)</div>
      <div class="chart-wrap" style="height: 180px;">
        <canvas id="chart-grades" role="img" aria-label="Staafdiagram routes per graad"></canvas>
      </div>
    </div>
  </div>
</div>

<!-- BOTTOM NAV -->
<nav class="bottom-nav">
  <button class="nav-btn active" onclick="showPage('home')" id="nav-home">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9,22 9,12 15,12 15,22"/></svg>
    Feed
  </button>
  <button class="nav-btn" onclick="showPage('log')" id="nav-log">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="16"/><line x1="8" y1="12" x2="16" y2="12"/></svg>
    Loggen
  </button>
  <button class="nav-btn" onclick="showPage('stats')" id="nav-stats">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="20" x2="18" y2="10"/><line x1="12" y1="20" x2="12" y2="4"/><line x1="6" y1="20" x2="6" y2="14"/></svg>
    Stats
  </button>
</nav>

<div class="toast" id="toast"></div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<script>
const GRADES = ['4','4+','5','5+','6a','6a+','6b','6b+','6c','6c+','7a','7a+','7b','7b+','7c','7c+','8a','8a+','8b','8b+'];
const GRADE_COLORS = ['#9FE1CB','#5DCAA5','#1D9E75','#0F6E56','#B5D4F4','#85B7EB','#378ADD','#185FA5','#CECBF6','#AFA9EC','#7F77DD','#534AB7','#F5C4B3','#F0997B','#D85A30','#993C1D','#F4C0D1','#ED93B1','#D4537E','#993356'];

let sessions = JSON.parse(localStorage.getItem('bsessions') || '[]');
let chartP = null, chartG = null;
let routeCount = 0;

function save() { localStorage.setItem('bsessions', JSON.stringify(sessions)); }
function gi(g) { return GRADES.indexOf(g); }

function showPage(id) {
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
  document.getElementById('page-'+id).classList.add('active');
  document.getElementById('nav-'+id).classList.add('active');
  if (id === 'home') renderFeed();
  if (id === 'stats') renderStats();
}

function toast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2200);
}

function allRoutes() {
  return sessions.flatMap(s => s.routes.map(r => ({ ...r, date: s.date, gym: s.gym })));
}
function getPR(type) {
  const r = allRoutes().filter(x => type === 'flash' ? x.result === 'flash' : (x.result === 'top' || x.result === 'flash'));
  if (!r.length) return null;
  return r.reduce((b, x) => gi(x.grade) > gi(b.grade) ? x : b, r[0]);
}
function maxGrade(routes) {
  const t = routes.filter(r => r.result !== 'poging');
  if (!t.length) return null;
  return t.reduce((b, r) => gi(r.grade) > gi(b.grade) ? r : b, t[0]);
}

/* ---- FEED ---- */
function renderFeed() {
  const pt = getPR('top');
  document.getElementById('hs-sessions').textContent = sessions.length;
  document.getElementById('hs-routes').textContent = allRoutes().length;
  document.getElementById('hs-pr').textContent = pt ? pt.grade : '—';

  const feed = document.getElementById('feed');
  if (!sessions.length) {
    feed.innerHTML = '<div class="empty-feed"><div class="big">Nog geen sessies</div><div>Log je eerste bouldering sessie!</div></div>';
    return;
  }
  const sorted = [...sessions].reverse();
  feed.innerHTML = sorted.map((s, i) => {
    const mg = maxGrade(s.routes);
    const delay = i * 0.05;
    const chips = s.routes.map(r =>
      `<div class="route-chip chip-${r.result}"><div class="dot"></div>${r.grade}${r.type ? ' · '+r.type : ''}${r.color ? ' · '+r.color : ''}</div>`
    ).join('');
    return `<div class="activity-card" style="animation-delay:${delay}s">
      <div class="activity-header">
        <div>
          <div class="activity-gym">${s.gym || 'Gym'}</div>
          <div class="activity-date">${formatDate(s.date)} · ${s.routes.length} route${s.routes.length !== 1 ? 's' : ''}</div>
        </div>
        <div style="text-align:right">
          <div class="activity-max">${mg ? mg.grade : '—'}</div>
          <div class="activity-max-label">max</div>
        </div>
      </div>
      <div class="activity-routes">${chips}</div>
    </div>`;
  }).join('');
}

function formatDate(d) {
  if (!d) return '';
  const dt = new Date(d + 'T00:00:00');
  return dt.toLocaleDateString('nl-NL', { weekday: 'short', day: 'numeric', month: 'short' });
}

/* ---- LOG ---- */
function addRouteCard(grade='6a', color='', attempts=1, result='top', type='') {
  routeCount++;
  const id = routeCount;
  const TYPES = ['Slab','Verticaal','Overhang','Cave','Dyno','Mantle','Pinch','Crimp','Sloper'];
  const div = document.createElement('div');
  div.className = 'route-card';
  div.id = 'rc-' + id;
  div.innerHTML = `
    <div class="route-card-header">
      <div class="route-num">Route ${id}</div>
      <button class="btn-remove-route" onclick="document.getElementById('rc-${id}').remove()">×</button>
    </div>
    <div class="route-fields">
      <div class="field">
        <label>Graad</label>
        <select id="rg-${id}">${GRADES.map(g=>`<option ${g===grade?'selected':''}>${g}</option>`).join('')}</select>
      </div>
      <div class="field">
        <label>Kleur</label>
        <input type="text" id="rc-color-${id}" value="${color}" placeholder="rood, blauw...">
      </div>
      <div class="field">
        <label>Type</label>
        <select id="rt-${id}">
          <option value="">— type —</option>
          ${TYPES.map(t=>`<option ${t===type?'selected':''}>${t}</option>`).join('')}
        </select>
      </div>
      <div class="field">
        <label>Pogingen</label>
        <input type="number" id="ra-${id}" value="${attempts}" min="1" max="99">
      </div>
      <div class="field full">
        <label>Resultaat</label>
        <div class="result-toggle">
          <button class="result-btn ${result==='top'?'sel-top':''}" onclick="setResult(${id},'top',this)">Top</button>
          <button class="result-btn ${result==='flash'?'sel-flash':''}" onclick="setResult(${id},'flash',this)">Flash</button>
          <button class="result-btn ${result==='poging'?'sel-poging':''}" onclick="setResult(${id},'poging',this)">Poging</button>
        </div>
      </div>
    </div>
    <input type="hidden" id="rr-${id}" value="${result}">
  `;
  document.getElementById('route-cards').appendChild(div);
}

function setResult(id, val, btn) {
  document.getElementById('rr-' + id).value = val;
  const btns = btn.parentElement.querySelectorAll('.result-btn');
  btns.forEach(b => b.className = 'result-btn');
  btn.classList.add('sel-' + val);
}

function saveSession() {
  const date = document.getElementById('inp-date').value;
  const gym = document.getElementById('inp-gym').value.trim();
  if (!date) { toast('Vul een datum in'); return; }
  const cards = document.querySelectorAll('.route-card');
  if (!cards.length) { toast('Voeg een route toe'); return; }
  const routes = [];
  cards.forEach(c => {
    const id = c.id.replace('rc-', '');
    routes.push({
      grade: document.getElementById('rg-' + id).value,
      color: document.getElementById('rc-color-' + id).value.trim(),
      type: document.getElementById('rt-' + id).value,
      attempts: parseInt(document.getElementById('ra-' + id).value) || 1,
      result: document.getElementById('rr-' + id).value
    });
  });
  sessions.push({ date, gym, routes, id: Date.now() });
  sessions.sort((a, b) => a.date.localeCompare(b.date));
  save();
  document.getElementById('route-cards').innerHTML = '';
  document.getElementById('inp-gym').value = '';
  routeCount = 0;
  addRouteCard();
  toast('Sessie opgeslagen!');
  showPage('home');
}

/* ---- STATS ---- */
function renderStats() {
  const pt = getPR('top'), pf = getPR('flash');
  document.getElementById('pr-top').textContent = pt ? pt.grade : '—';
  document.getElementById('pr-top-date').textContent = pt ? formatDate(pt.date) : '';
  document.getElementById('pr-flash').textContent = pf ? pf.grade : '—';
  document.getElementById('pr-flash-date').textContent = pf ? formatDate(pf.date) : '';

  // progress line chart
  const maxPS = sessions.map(s => {
    const mg = maxGrade(s.routes);
    return mg ? { date: s.date, idx: gi(mg.grade), grade: mg.grade } : null;
  }).filter(Boolean);

  if (chartP) chartP.destroy();
  chartP = new Chart(document.getElementById('chart-progress'), {
    type: 'line',
    data: {
      labels: maxPS.map(s => s.date.slice(5)),
      datasets: [{
        data: maxPS.map(s => s.idx),
        borderColor: '#7f77dd',
        backgroundColor: 'rgba(127,119,221,0.12)',
        borderWidth: 2,
        pointBackgroundColor: '#7f77dd',
        pointRadius: 5,
        pointHoverRadius: 7,
        tension: 0.35,
        fill: true
      }]
    },
    options: {
      responsive: true, maintainAspectRatio: false,
      plugins: { legend: { display: false } },
      scales: {
        x: { ticks: { color: '#666', font: { size: 11 } }, grid: { color: 'rgba(255,255,255,0.05)' } },
        y: {
          min: 0,
          max: GRADES.length - 1,
          ticks: { color: '#666', font: { size: 11 }, callback: v => GRADES[v] || '', stepSize: 2 },
          grid: { color: 'rgba(255,255,255,0.05)' }
        }
      }
    }
  });

  // grades bar chart
  const counts = {};
  GRADES.forEach(g => counts[g] = 0);
  allRoutes().filter(r => r.result !== 'poging').forEach(r => counts[r.grade]++);
  const used = GRADES.filter(g => counts[g] > 0);

  if (chartG) chartG.destroy();
  chartG = new Chart(document.getElementById('chart-grades'), {
    type: 'bar',
    data: {
      labels: used.length ? used : ['—'],
      datasets: [{
        data: used.length ? used.map(g => counts[g]) : [0],
        backgroundColor: used.map(g => GRADE_COLORS[GRADES.indexOf(g)] || '#444'),
        borderRadius: 6,
        borderSkipped: false
      }]
    },
    options: {
      responsive: true, maintainAspectRatio: false,
      plugins: { legend: { display: false } },
      scales: {
        x: { ticks: { color: '#666', font: { size: 11 } }, grid: { display: false } },
        y: { beginAtZero: true, ticks: { color: '#666', font: { size: 11 }, stepSize: 1 }, grid: { color: 'rgba(255,255,255,0.05)' } }
      }
    }
  });
}

/* INIT */
document.getElementById('inp-date').value = new Date().toISOString().split('T')[0];
addRouteCard();
renderFeed();
</script>
